<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Nearby News &amp; Alert System</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>Nearby News &amp; Alert System</h1>
        <p class="intro">
          Real-time local updates from people around you. Login to create
          alerts, or continue without login to just browse the feed.
        </p>
      </header>

      <main class="app-main single-column">
        <section class="panel">
          <h2>Account</h2>
          <input
            id="emailInput"
            type="email"
            placeholder="Email"
          />
          <input
            id="passwordInput"
            type="password"
            placeholder="Password"
          />

          <div class="btn-row">
            <button id="signupBtn">Sign up</button>
            <button id="loginBtn">Login</button>
          </div>

          <button id="skipAuthBtn" class="full-width small-btn">
            Continue without login (Do it later)
          </button>
        </section>
      </main>

      <footer class="app-footer">
        <small>Built by isevenx</small>
      </footer>
    </div>

    <!-- Firebase SDKs -->
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"
      defer
    ></script>

    <!-- Config + Login logic -->
    <script src="./firebaseConfig.js" defer></script>
    <script src="./login.js" defer></script>
  </body>
</html>
