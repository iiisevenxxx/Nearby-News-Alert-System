<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Nearby News - Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <header class="top-nav">
      <div class="nav-left">
        <button id="menuToggle" class="menu-btn">&#9776;</button>
        <span class="app-title">Nearby News</span>
      </div>
      <nav id="sideMenu" class="side-menu">
        <a href="index.html">Home</a>
        <a href="login.html">Login / Signup</a>
        <a href="account.html">Account</a>
        <a href="app.html">Create / Nearby News</a>
      </nav>
      <div id="backdrop" class="backdrop"></div>
    </header>

    <main class="home-container">
      <h2>Latest Nearby News</h2>
      <div id="newsList" class="news-list"></div>
    </main>

    <!-- Firebase v8 (same as app.html) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebaseConfig.js"></script>
    <script src="nav.js"></script>

    <script>
      const db = firebase.firestore();

      // User location cache for distance
      let userLocation = null;

      function haversineDistance(lat1, lon1, lat2, lon2) {
        const toRad = (x) => (x * Math.PI) / 180;
        const R = 6371; // km
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      function formatDistanceOnly(data) {
        if (
          !userLocation ||
          !data.location ||
          typeof data.location.latitude !== "number" ||
          typeof data.location.longitude !== "number"
        ) {
          return "";
        }

        const dKm = haversineDistance(
          userLocation.lat,
          userLocation.lng,
          data.location.latitude,
          data.location.longitude
        );

        const km = Math.round(dKm * 10) / 10;
        const m = Math.round(dKm * 1000);

        // Hamesha km + meters (pehle ki tarah)
        return `${km} km (${m} m)`;
      }

      function formatMetaLine(data) {
        let timeText = "";
        if (data.createdAt && data.createdAt.toDate) {
          timeText = data.createdAt.toDate().toLocaleString();
        }

        const distanceText = formatDistanceOnly(data);
        const addressText = data.address || "";

        const parts = [];
        if (timeText) parts.push(timeText);
        if (distanceText) parts.push(distanceText);
        if (addressText) parts.push(addressText);

        if (parts.length === 0) return "";
        return parts.join(" • ");
      }

      function renderNewsCard(id, data) {
        const card = document.createElement("div");
        card.className = "news-card";
        card.addEventListener("click", () => {
          window.location.href = `news.html?id=${id}`;
        });

        const title = data.title || "Untitled News";
        const body = (data.content || "").slice(0, 80) + "...";
        const metaLine = formatMetaLine(data);

        card.innerHTML = `
          <h3>${title}</h3>
          <p>${body}</p>
          <p class="news-meta-small">
            ${metaLine}
          </p>
          ${
            data.imageUrl
              ? `<img src="${data.imageUrl}" alt="${title}" class="news-image" />`
              : ""
          }
          <span class="read-more">Read more</span>
        `;
        return card;
      }

      async function loadNews() {
        const listEl = document.getElementById("newsList");
        listEl.textContent = "Loading...";
        try {
          const snap = await db
            .collection("posts")
            .orderBy("createdAt", "desc")
            .limit(20)
            .get();

          listEl.textContent = "";

          if (snap.empty) {
            listEl.textContent = "No news found.";
            return;
          }

          snap.forEach((doc) => {
            listEl.appendChild(renderNewsCard(doc.id, doc.data()));
          });
        } catch (e) {
          console.error("Home load error:", e);
          listEl.textContent = "Error loading news.";
        }
      }

      function initHome() {
        if (!navigator.geolocation) {
          loadNews();
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            userLocation = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude
            };
            loadNews();
          },
          () => {
            loadNews();
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }

      document.addEventListener("DOMContentLoaded", initHome);
    </script>
  </body>
</html>
