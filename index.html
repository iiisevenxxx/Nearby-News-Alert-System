<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <title>Nearby News - Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-left">
        <button id="menuToggle" class="icon-button" aria-label="Toggle menu">
          ☰
        </button>
        <span class="logo-text">Nearby News</span>
      </div>
      <div class="nav-right">
        <button id="themeToggle" class="icon-button" aria-label="Toggle theme">
          🌓
        </button>
      </div>
    </header>

    <nav id="sideMenu" class="side-menu">
      <a href="index.html">Home</a>
      <a href="login.html">Login / Signup</a>
      <a href="account.html">Account</a>
      <a href="app.html">Create / Nearby News</a>
      <a href="map.html">Live Map</a>
      <a href="admin.html">Admin</a>
    </nav>

    <main class="page-content">
      <section class="section-card">
        <h1>Latest Nearby News</h1>
        <div class="tab-row">
          <button class="tab-button active" data-tab="all">News</button>
          <button class="tab-button" data-tab="new">New</button>
        </div>

        <div id="newsList" class="news-list">
          <p class="muted">Loading latest news around you...</p>
        </div>
      </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
      // --- Firebase init ---
      const firebaseConfig = {
        apiKey: "AIzaSyAidKMs67_gh4xNLQXiNyDwE4AbhrbvZ7M",
        authDomain: "nearby-news-alert-system.firebaseapp.com",
        projectId: "nearby-news-alert-system",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // --- UI controls ---
      const menuToggle = document.getElementById("menuToggle");
      const sideMenu = document.getElementById("sideMenu");
      const themeToggle = document.getElementById("themeToggle");
      const newsListEl = document.getElementById("newsList");

      menuToggle.addEventListener("click", () => {
        sideMenu.classList.toggle("open");
      });

      themeToggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark-theme");
      });

      // --- Geo + distance ---
      let userLocation = null;

      function haversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // km
        const toRad = (v) => (v * Math.PI) / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(lat1)) *
            Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      // Country approx centers (same as admin)
      const COUNTRY_COORDS = {
        india: { latitude: 20.5937, longitude: 78.9629 },
        canada: { latitude: 56.1304, longitude: -106.3468 },
        "united states of america": { latitude: 39.8283, longitude: -98.5795 },
        usa: { latitude: 39.8283, longitude: -98.5795 },
        japan: { latitude: 36.2048, longitude: 138.2529 },
        china: { latitude: 35.8617, longitude: 104.1954 },
        "united kingdom": { latitude: 55.3781, longitude: -3.436 },
        uk: { latitude: 55.3781, longitude: -3.436 },
        australia: { latitude: -25.2744, longitude: 133.7751 },
        nigeria: { latitude: 9.082, longitude: 8.6753 },
        ghana: { latitude: 7.9465, longitude: -1.0232 },
        "south africa": { latitude: -30.5595, longitude: 22.9375 },
        russia: { latitude: 61.524, longitude: 105.3188 },
        jamaica: { latitude: 18.1096, longitude: -77.2975 },
        "dominican republic": { latitude: 18.7357, longitude: -70.1627 },
        kenya: { latitude: -0.0236, longitude: 37.9062 },
      };

      // UPDATED: use lat/lng if present, else country/address fallback
      function formatDistanceOnly(data) {
        if (!userLocation) return "";

        let lat = null;
        let lng = null;

        // 1) Nearby posts with stored coordinates
        if (
          data.location &&
          typeof data.location.latitude === "number" &&
          typeof data.location.longitude === "number" &&
          !(data.location.latitude === 0 && data.location.longitude === 0)
        ) {
          lat = data.location.latitude;
          lng = data.location.longitude;
        } else {
          // 2) External posts: use country/address/location string
          const rawLocation =
            (data.country || data.address || data.location || "") + "";
          const key = rawLocation.toLowerCase().trim();
          const coords = COUNTRY_COORDS[key];
          if (coords) {
            lat = coords.latitude;
            lng = coords.longitude;
          }
        }

        if (lat == null || lng == null) return "";

        const dKm = haversineDistance(
          userLocation.lat,
          userLocation.lng,
          lat,
          lng
        );
        const km = Math.round(dKm * 10) / 10;
        const m = Math.round(dKm * 1000);

        return `${km} km (${m} m)`;
      }

      function formatDateOnly(data) {
        let dt = null;
        if (data.publishedAt && data.publishedAt.toDate) {
          dt = data.publishedAt.toDate();
        } else if (data.createdAt && data.createdAt.toDate) {
          dt = data.createdAt.toDate();
        }
        if (!dt) return "";
        return dt.toLocaleString("en-IN");
      }

      function buildLocationText(data) {
        if (data.address) return data.address;
        if (typeof data.location === "string") return data.location;
        if (
          data.location &&
          typeof data.location.latitude === "number" &&
          typeof data.location.longitude === "number"
        ) {
          return `${data.location.latitude.toFixed(
            3
          )}, ${data.location.longitude.toFixed(3)}`;
        }
        return "Unknown location";
      }

      function renderNewsList(docs) {
        if (!docs.length) {
          newsListEl.innerHTML =
            '<p class="muted">No news found around you yet.</p>';
          return;
        }

        let html = "";
        docs.forEach((doc) => {
          const data = doc.data();
          const title = data.title || "Untitled news";
          const content = (data.content || "").slice(0, 140);
          const timeText = formatDateOnly(data);
          const distanceText = formatDistanceOnly(data);
          const locationText = buildLocationText(data);
          const distancePart = distanceText
            ? ` • ${distanceText} • ${locationText}`
            : ` • ${locationText}`;

          html += `
            <article class="news-card">
              <h2>${title}</h2>
              <p class="news-meta">
                ${timeText}${distancePart}
              </p>
              <p>${content}...</p>
              <a href="app.html?id=${doc.id}" class="link-button">Read more</a>
            </article>
          `;
        });

        newsListEl.innerHTML = html;
      }

      async function loadNewsAroundUser() {
        newsListEl.innerHTML =
          '<p class="muted">Loading latest news around you...</p>';

        try {
          // Last 100 posts; sorting client-side by distance
          const snap = await db
            .collection("posts")
            .orderBy("createdAt", "desc")
            .limit(100)
            .get();

          let docs = snap.docs;

          if (userLocation) {
            docs = docs
              .map((doc) => {
                const data = doc.data();
                let lat = null;
                let lng = null;

                if (
                  data.location &&
                  typeof data.location.latitude === "number" &&
                  typeof data.location.longitude === "number" &&
                  !(data.location.latitude === 0 &&
                    data.location.longitude === 0)
                ) {
                  lat = data.location.latitude;
                  lng = data.location.longitude;
                } else {
                  const rawLocation =
                    (data.country ||
                      data.address ||
                      data.location ||
                      "") + "";
                  const key = rawLocation.toLowerCase().trim();
                  const coords = COUNTRY_COORDS[key];
                  if (coords) {
                    lat = coords.latitude;
                    lng = coords.longitude;
                  }
                }

                let dKm = Number.POSITIVE_INFINITY;
                if (lat != null && lng != null) {
                  dKm = haversineDistance(
                    userLocation.lat,
                    userLocation.lng,
                    lat,
                    lng
                  );
                }
                return { doc, dKm };
              })
              .sort((a, b) => a.dKm - b.dKm)
              .map((x) => x.doc);
          }

          renderNewsList(docs);
        } catch (e) {
          console.error("Error loading news:", e);
          newsListEl.innerHTML =
            '<p class="muted">Failed to load news.</p>';
        }
      }

      function initLocationAndLoad() {
        if (!navigator.geolocation) {
          loadNewsAroundUser();
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            userLocation = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
            };
            loadNewsAroundUser();
          },
          () => {
            // Permission denied or error
            loadNewsAroundUser();
          },
          {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 300000,
          }
        );
      }

      document.addEventListener("DOMContentLoaded", () => {
        initLocationAndLoad();
      });
    </script>
  </body>
</html>
