<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nearby News & Alert System</title>
  </head>
  <body>
    <h1>Nearby News & Alert System</h1>

    <h2>Login / Signup (Email)</h2>
    <input id="emailInput" type="email" placeholder="Email" />
    <br />
    <input id="passwordInput" type="password" placeholder="Password" />
    <br />
    <button id="signupBtn">Sign up</button>
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" style="display:none;">Logout</button>

    <p id="userInfo"></p>

    <h2>Create News</h2>
    <input id="titleInput" placeholder="Title" />
    <br />
    <textarea id="contentInput" placeholder="Details"></textarea>
    <br />
    <button id="postBtn">Post with my location</button>

    <h2>Nearby News</h2>
    <button id="loadNearbyBtn">Load nearby news</button>
    <ul id="newsList"></ul>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="firebaseConfig.js"></script>
    <script src="app.js"></script>
  </body>
</html>
