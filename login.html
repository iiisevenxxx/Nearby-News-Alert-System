<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Nearby News - Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Navbar -->
    <header class="top-nav">
      <div class="nav-left">
        <button id="menuToggle" class="menu-btn">&#9776;</button>
        <span class="app-title">Nearby News</span>
      </div>
      <nav id="sideMenu" class="side-menu">
        <a href="index.html">Home</a>
        <a href="login.html">Login / Signup</a>
        <a href="account.html">Account</a>
        <a href="app.html">Create / Nearby News</a>
      </nav>
      <div id="backdrop" class="backdrop"></div>
    </header>

    <main class="auth-container">
      <section class="panel auth-panel">
        <h2>Login / Signup</h2>

        <input
          id="authEmail"
          type="email"
          placeholder="Email"
        />
        <input
          id="authPassword"
          type="password"
          placeholder="Password"
        />

        <div class="btn-row">
          <button id="authSignupBtn">Sign up</button>
          <button id="authLoginBtn">Login</button>
        </div>

        <button
          id="authLogoutBtn"
          class="full-width"
          style="display: none;"
        >
          Logout
        </button>

        <p id="authStatus" class="auth-status">
          Not logged in.
        </p>
      </section>
    </main>

    <!-- Firebase SDKs (same version as app.html) -->
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"
      defer
    ></script>
    <script src="firebaseConfig.js" defer></script>
    <script src="nav.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (!firebase.apps.length) {
          // firebaseConfig.js already initializes; just in case
          // firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();

        const emailInput = document.getElementById('authEmail');
        const passwordInput = document.getElementById('authPassword');
        const signupBtn = document.getElementById('authSignupBtn');
        const loginBtn = document.getElementById('authLoginBtn');
        const logoutBtn = document.getElementById('authLogoutBtn');
        const statusP = document.getElementById('authStatus');

        function setStatus(text) {
          statusP.textContent = text;
        }

        signupBtn.addEventListener('click', function () {
          const email = emailInput.value.trim();
          const password = passwordInput.value.trim();
          if (!email || !password) {
            setStatus('Please enter email and password.');
            return;
          }
          auth
            .createUserWithEmailAndPassword(email, password)
            .then((cred) => {
              setStatus('Account created & logged in as ' + cred.user.email);
            })
            .catch((err) => {
              console.error(err);
              setStatus(err.message);
            });
        });

        loginBtn.addEventListener('click', function () {
          const email = emailInput.value.trim();
          const password = passwordInput.value.trim();
          if (!email || !password) {
            setStatus('Please enter email and password.');
            return;
          }
          auth
            .signInWithEmailAndPassword(email, password)
            .then((cred) => {
              setStatus('Logged in as ' + cred.user.email);
            })
            .catch((err) => {
              console.error(err);
              setStatus(err.message);
            });
        });

        logoutBtn.addEventListener('click', function () {
          auth.signOut().catch((err) => {
            console.error(err);
            setStatus(err.message);
          });
        });

        auth.onAuthStateChanged((user) => {
          if (user) {
            setStatus('Logged in as ' + user.email);
            logoutBtn.style.display = 'block';
          } else {
            setStatus('Not logged in.');
            logoutBtn.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
