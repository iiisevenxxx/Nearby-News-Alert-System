<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Nearby News &amp; Alert System - App</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-container">
      <header class="app-header">
        <div class="nav-bar">
          <div class="nav-left">
            <span class="logo-text">Nearby News &amp; Alert System</span>
          </div>
          <div class="nav-right">
            <span id="userInfo" class="user-label">Not logged in.</span>
            <button id="loginBtn" class="small-btn">Login</button>
            <button id="signupBtn" class="small-btn">Sign up</button>
            <button
              id="logoutBtn"
              class="small-btn"
              style="display: none;"
            >
              Logout
            </button>
          </div>
        </div>
      </header>

      <main class="app-main">
        <!-- Create News -->
        <section class="panel app-section">
          <h2>Create News</h2>
          <input
            id="titleInput"
            type="text"
            placeholder="Title"
          />
          <textarea
            id="contentInput"
            placeholder="Details"
            rows="3"
          ></textarea>
          <input
            id="imageInput"
            type="file"
            accept="image/*"
          />
          <button id="postBtn" class="full-width">
            Post with my location
          </button>
        </section>

        <!-- Nearby News -->
        <section class="panel panel-wide app-section">
          <div class="list-header">
            <h2>Nearby News</h2>
            <button id="loadNearbyBtn" class="small-btn">
              Load nearby news
            </button>
          </div>
          <ul id="newsList"></ul>
        </section>
      </main>

      <footer class="app-footer">
        <small>Built by isevenx</small>
      </footer>
    </div>

    <!-- Firebase SDKs -->
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"
      defer
    ></script>
    <script
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"
      defer
    ></script>

    <!-- Config + App logic -->
    <script src="./firebaseConfig.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
